name: Sync to algostudy

on:
  push:
    branches:
      - main
    paths:
      - "Data Structures & Algorithms/**"
      - "Only in LeetCode/**"
      - "scripts/**"
      - ".github/workflows/sync-to-algostudy.yml"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Generate LeetCode README files as an artifact without pushing to algostudy"
        required: false
        type: boolean
        default: false
      gemini_model:
        description: "Gemini model used for README analysis"
        required: false
        type: string
        default: "gemini-2.5-flash"
      refresh_ai:
        description: "Ignore cached AI analysis markers and regenerate analysis"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: ${{ inputs.gemini_model || 'gemini-2.5-flash' }}

concurrency:
  group: sync-to-algostudy
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source submissions
        uses: actions/checkout@v6
        with:
          path: source
          fetch-depth: 0

      - name: Checkout algostudy archive
        uses: actions/checkout@v6
        with:
          repository: samu9nai/algostudy
          token: ${{ secrets.ALGOSTUDY_SYNC_TOKEN }}
          path: archive
          sparse-checkout: |
            LeetCode
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Normalize submissions
        run: |
          args=(
            --source source
            --output archive
            --map source/scripts/problem-map.json
            --template source/scripts/templates/leetcode-readme.md
          )

          if [ "${{ inputs.refresh_ai || 'false' }}" = "true" ]; then
            args+=(--refresh-ai)
          fi

          node source/scripts/normalize-submissions.mjs "${args[@]}"

      - name: Upload test artifact
        if: ${{ inputs.test_mode == true }}
        uses: actions/upload-artifact@v6
        with:
          name: leetcode-readme-test-${{ inputs.gemini_model || 'gemini-2.5-flash' }}
          path: archive/LeetCode
          if-no-files-found: error

      - name: Commit and push archive changes
        if: ${{ inputs.test_mode != true }}
        run: |
          cd archive

          if [ -z "$(git status --porcelain LeetCode)" ]; then
            echo "No LeetCode archive changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LeetCode
          git commit -m "Sync LeetCode submissions"
          git push
